
on:
  push:
    branches:
      - "master"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
      - run: gem install kamal -v '~> 2.0'
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan "$KAMAL_SERVER_ADDRESS" >> ~/.ssh/known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          KAMAL_SERVER_ADDRESS: ${{ secrets.KAMAL_SERVER_ADDRESS }}
      - name: Deploy with Kamal
        run: kamal deploy --skip-push --version=${{ github.sha }}
        env:
          KAMAL_REGISTRY_USERNAME: ${{ github.actor }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KAMAL_SERVER_ADDRESS: ${{ secrets.KAMAL_SERVER_ADDRESS }}
      - name: Discord notification
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            COLOR=3066993
            COMMIT_SUBJECT=$(git log -1 --format=%s "$COMMIT_SHA")
            DESCRIPTION=$(printf 'Commit: %s\n%s' "$COMMIT_SHA" "$COMMIT_SUBJECT")
          else
            COLOR=15158332
            DESCRIPTION="[See logs]($SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID)"
          fi
          PAYLOAD=$(jq -n \
            --arg title "bot-bahamut deploy $JOB_STATUS" \
            --arg description "$DESCRIPTION" \
            --argjson color "$COLOR" \
            '{embeds: [{title: $title, description: $description, color: $color}]}')
          curl -fsSL -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
